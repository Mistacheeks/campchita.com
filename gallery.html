<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camp Chita Outdoors | Edge Style Gallery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =========================================
   RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--mustard:#d4a017;
--charcoal:#404040;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Montserrat',sans-serif;
background:#000;
}

/* =========================================
   MAIN GALLERY
========================================= */

.edge-gallery{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
background:#000;
}

/* =========================================
   BACKGROUND BLUR
========================================= */

.bg-blur{
position:absolute;
inset:0;
z-index:1;
overflow:hidden;
}

.bg-blur img{
width:120%;
height:120%;
object-fit:cover;

position:absolute;
top:-10%;
left:-10%;

filter:
blur(55px)
brightness(.22)
saturate(120%);

transform:scale(1.15);

opacity:.65;

transition:
transform 1.4s ease,
opacity 1.4s ease;
}

/* =========================================
   SIDE PANELS
========================================= */

.side-panel{
position:absolute;
top:50%;

width:38%;
height:80vh;

border-radius:42px;
overflow:hidden;

opacity:.42;
z-index:2;

transition:
all 1s cubic-bezier(.22,1,.36,1);
}

.side-panel img{
width:100%;
height:100%;
object-fit:cover;

filter:
blur(2px)
brightness(.75);

transform:scale(1.06);
}

.left-panel{
left:-11%;

transform:
translateY(-50%)
rotate(-8deg);
}

.right-panel{
right:-11%;

transform:
translateY(-50%)
rotate(8deg);
}

/* =========================================
   MAIN VIEWER
========================================= */

.main-viewer{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:min(80vw,1120px);
height:90vh;

border-radius:42px;
overflow:hidden;

z-index:10;

background:
linear-gradient(
180deg,
rgba(18,22,30,.96),
rgba(8,10,14,.96)
);

backdrop-filter:blur(20px);

box-shadow:
0 50px 120px rgba(0,0,0,.75);
}

/* =========================================
   IMAGE WRAPPER
========================================= */

.image-wrapper{
position:relative;
width:100%;
height:100%;
overflow:hidden;
perspective:2200px;
}

/* =========================================
   IMAGES
========================================= */

.gallery-image{
position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:cover;

backface-visibility:hidden;
transform-style:preserve-3d;
will-change:transform, opacity;

transition:
transform 1s cubic-bezier(.22,1,.36,1),
opacity 1s ease;
}

/* CURRENT */

.gallery-image.active{
z-index:3;
opacity:1;
transform:
translateX(0)
rotateY(0deg)
scale(1);
}

/* EXIT LEFT */

.gallery-image.exit-left{
z-index:2;

opacity:.2;

transform:
translateX(-38%)
rotateY(45deg)
scale(.92);
}

/* EXIT RIGHT */

.gallery-image.exit-right{
z-index:2;

opacity:.2;

transform:
translateX(38%)
rotateY(-45deg)
scale(.92);
}

/* ENTER FROM RIGHT */

.gallery-image.enter-right{
z-index:1;

opacity:.2;

transform:
translateX(40%)
rotateY(-45deg)
scale(.92);
}

/* ENTER FROM LEFT */

.gallery-image.enter-left{
z-index:1;

opacity:.2;

transform:
translateX(-40%)
rotateY(45deg)
scale(.92);
}

/* =========================================
   OVERLAY
========================================= */

.main-overlay{
position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.82),
transparent 38%
);

z-index:5;
pointer-events:none;
}

/* =========================================
   DOTS
========================================= */

.top-indicators{
position:absolute;
top:28px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:10px;

z-index:20;
}

.indicator{
width:10px;
height:10px;

border-radius:999px;

background:
rgba(255,255,255,.25);

transition:.5s ease;
}

.indicator.active{
width:38px;
background:#fff;
}

/* =========================================
   CLOSE BUTTON
========================================= */

.close-btn{
position:absolute;

top:24px;
right:24px;

width:58px;
height:58px;

border-radius:18px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
cursor:pointer;

z-index:100;

transition:.45s ease;
}

.close-btn:hover{
transform:rotate(90deg);
background:
rgba(255,255,255,.16);
}

/* =========================================
   CONTENT
========================================= */

.viewer-content{
position:absolute;

left:0;
right:0;
bottom:0;

z-index:10;

padding:
0 60px
120px;
}

.viewer-content h1{
font-size:64px;
font-weight:800;

letter-spacing:-2px;

margin-bottom:16px;

transition:
opacity .6s ease,
transform .6s ease;
}

.viewer-content p{
max-width:720px;

font-size:18px;
line-height:1.8;

color:
rgba(255,255,255,.82);
}

/* =========================================
   BRANDING
========================================= */

.branding{
position:absolute;

left:28px;
bottom:28px;

z-index:30;

display:flex;
align-items:center;
gap:14px;
}

.branding img{
width:56px;
height:56px;
object-fit:contain;
}

.branding-text{
font-size:22px;
font-weight:800;
line-height:1.1;
}

.branding-text .camp{
color:var(--charcoal);
}

.branding-text .chita{
color:var(--mustard);
}

/* =========================================
   NAVIGATION
========================================= */

.nav{
position:absolute;

bottom:28px;
right:28px;

display:flex;
gap:14px;

z-index:30;
}

.nav button{
border:none;
cursor:pointer;

transition:
transform .4s ease,
box-shadow .4s ease;
}

/* PREV */

.prev-btn{
width:72px;
height:72px;

border-radius:22px;

background:#1f6fff;
color:#fff;

font-size:22px;

box-shadow:
0 15px 35px rgba(31,111,255,.25);
}

/* NEXT */

.next-btn{
width:185px;
height:72px;

border-radius:22px;

background:#d9f2ef;
color:#111;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 26px;

font-size:19px;
font-weight:700;

box-shadow:
0 15px 35px rgba(217,242,239,.16);
}

.nav button:hover{
transform:translateY(-4px);
}

/* =========================================
   THUMBNAILS
========================================= */

.thumbnail-bar{
position:absolute;

left:50%;
bottom:28px;

transform:translateX(-50%);

display:flex;
gap:12px;

z-index:20;
}

.thumb{
width:84px;
height:62px;

border-radius:14px;
overflow:hidden;

cursor:pointer;

border:2px solid transparent;

opacity:.65;

transition:.45s ease;
}

.thumb.active{
border:2px solid #fff;

opacity:1;

transform:
translateY(-4px)
scale(1.03);
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:900px){

.side-panel{
display:none;
}

.main-viewer{
width:100vw;
height:100vh;
border-radius:0;
}

.viewer-content{
padding:0 24px 140px;
}

.viewer-content h1{
font-size:38px;
}

.viewer-content p{
font-size:15px;
}

.thumbnail-bar{
display:none;
}

.branding{
left:18px;
bottom:18px;
}

.nav{
right:18px;
bottom:18px;
}

.prev-btn{
width:62px;
height:62px;
}

.next-btn{
width:145px;
height:62px;
font-size:16px;
}

}

</style>

</head>

<body>

<div class="edge-gallery">

<!-- =========================================
     BACKGROUND BLUR
========================================= -->

<div class="bg-blur">

<img id="bgImage"
src="images/001 (1).jpg">

</div>

<!-- =========================================
     SIDE PANELS
========================================= -->

<div class="side-panel left-panel">

<img id="leftImage"
src="images/001 (2).jpg">

</div>

<div class="side-panel right-panel">

<img id="rightImage"
src="images/001 (3).jpg">

</div>

<!-- =========================================
     MAIN VIEWER
========================================= -->

<div class="main-viewer">

<!-- DOTS -->

<div class="top-indicators"
id="indicators"></div>

<!-- CLOSE -->

<div class="close-btn"
id="closeBtn">

<i class="fa-solid fa-xmark"></i>

</div>

<!-- IMAGE WRAPPER -->

<div class="image-wrapper"
id="imageWrapper">

<img
class="gallery-image active"
id="currentImage"
src="images/Kayak.jpg">

</div>

<div class="main-overlay"></div>

<!-- CONTENT -->

<div class="viewer-content">

<h1 id="galleryTitle">
Wild Adventures
</h1>

<p>
Immerse yourself in breathtaking landscapes,
wildlife encounters,
campfire moments,
eco-tourism adventures,
and unforgettable outdoor experiences.
</p>

</div>

<!-- BRANDING -->

<div class="branding">

<img src="images/Camp Chita Logo.png">

<div class="branding-text">

<span class="camp">Camp</span><br>

<span class="chita">Chita Outdoors</span>

</div>

</div>

<!-- THUMBNAILS -->

<div class="thumbnail-bar"
id="thumbnailBar"></div>

<!-- NAV -->

<div class="nav">

<button class="prev-btn"
id="prevBtn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button class="next-btn"
id="nextBtn">

<span>Next</span>

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

</div>

<script>

/* =========================================
   GALLERY DATA
========================================= */

const gallery = [

{
image:"images/game viewing.png",
title:"Wild Adventures"
},

{
image:"images/campfire-tales.jpg",
title:"Campfire Stories"
},

{
image:"images/001 (3).jpg",
title:"Nature Trails"
},

{
image:"images/graceful gazelle.png",
title:"Safari Escapes"
},

{
image:"images/001 (5).jpg",
title:"River Moments"
},

{
image:"images/001 (6).jpg",
title:"Outdoor Living"
},

{
image:"images/001 (7).jpg",
title:"Golden Landscapes"
},

{
image:"images/001 (8).jpg",
title:"Eco Tourism"
},

{
image:"images/001 (9).jpg",
title:"Wilderness Nights"
}

];

/* =========================================
   ELEMENTS
========================================= */

const currentImage =
document.getElementById('currentImage');

const imageWrapper =
document.getElementById('imageWrapper');

const bgImage =
document.getElementById('bgImage');

const leftImage =
document.getElementById('leftImage');

const rightImage =
document.getElementById('rightImage');

const galleryTitle =
document.getElementById('galleryTitle');

const indicators =
document.getElementById('indicators');

const thumbnailBar =
document.getElementById('thumbnailBar');

const nextBtn =
document.getElementById('nextBtn');

const prevBtn =
document.getElementById('prevBtn');

const closeBtn =
document.getElementById('closeBtn');

let current = 0;
let animating = false;

/* =========================================
   BUILD UI
========================================= */

function buildUI(){

indicators.innerHTML='';
thumbnailBar.innerHTML='';

gallery.forEach((item,index)=>{

/* DOT */

const dot =
document.createElement('div');

dot.classList.add('indicator');

if(index === current){
dot.classList.add('active');
}

indicators.appendChild(dot);

/* THUMB */

const thumb =
document.createElement('div');

thumb.classList.add('thumb');

if(index === current){
thumb.classList.add('active');
}

thumb.innerHTML =
`<img src="${item.image}">`;

thumb.addEventListener('click',()=>{

if(animating) return;

if(index > current){

changeSlide(index,'next');

}else{

changeSlide(index,'prev');

}

});

thumbnailBar.appendChild(thumb);

});

}

/* =========================================
   CHANGE SLIDE
========================================= */

function changeSlide(newIndex,direction){

if(animating) return;

animating = true;

const outgoing =
document.querySelector('.gallery-image.active');

const incoming =
document.createElement('img');

incoming.src =
gallery[newIndex].image;

incoming.classList.add(
'gallery-image'
);

incoming.classList.add(
direction === 'next'
? 'enter-right'
: 'enter-left'
);

imageWrapper.appendChild(incoming);

/* FORCE REFLOW */

incoming.offsetHeight;

/* OUTGOING */

outgoing.classList.remove('active');

outgoing.classList.add(
direction === 'next'
? 'exit-left'
: 'exit-right'
);

/* INCOMING */

incoming.classList.remove(
direction === 'next'
? 'enter-right'
: 'enter-left'
);

incoming.classList.add('active');

/* UPDATE */

current = newIndex;

galleryTitle.textContent =
gallery[current].title;

bgImage.src =
gallery[current].image;

/* SIDE IMAGES */

let prev =
(current - 1 + gallery.length)
% gallery.length;

let next =
(current + 1)
% gallery.length;

leftImage.src =
gallery[prev].image;

rightImage.src =
gallery[next].image;

buildUI();

/* CLEANUP */

setTimeout(()=>{

outgoing.remove();

animating = false;

},1000);

}

/* =========================================
   NEXT
========================================= */

function nextImage(){

let next =
current + 1;

if(next >= gallery.length){
next = 0;
}

changeSlide(next,'next');

}

/* =========================================
   PREVIOUS
========================================= */

function prevImage(){

let prev =
current - 1;

if(prev < 0){
prev = gallery.length - 1;
}

changeSlide(prev,'prev');

}

/* =========================================
   BUTTONS
========================================= */

nextBtn.addEventListener(
'click',
nextImage
);

prevBtn.addEventListener(
'click',
prevImage
);

/* =========================================
   CLOSE
========================================= */

closeBtn.addEventListener(
'click',
()=>{

window.location.href =
'index.html';

}
);

/* =========================================
   KEYBOARD
========================================= */

document.addEventListener(
'keydown',
(e)=>{

if(e.key === 'ArrowRight'){
nextImage();
}

if(e.key === 'ArrowLeft'){
prevImage();
}

if(e.key === 'Escape'){

window.location.href =
'index.html';

}

}
);

/* =========================================
   TOUCH
========================================= */

let startX = 0;

document.addEventListener(
'touchstart',
(e)=>{

startX =
e.touches[0].clientX;

}
);

document.addEventListener(
'touchend',
(e)=>{

let endX =
e.changedTouches[0].clientX;

let diff =
startX - endX;

if(diff > 50){
nextImage();
}

if(diff < -50){
prevImage();
}

}
);

/* =========================================
   PRELOAD
========================================= */

gallery.forEach((item)=>{

const img =
new Image();

img.src =
item.image;

});

/* =========================================
   INITIALIZE
========================================= */

buildUI();

</script>

</body>
</html>
